name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install test and reporting dependencies
        run: python -m pip install -e ".[dev,reports]"
      - name: Compile Python sources
        run: python -m compileall -q scripts src
      - name: Run tests
        run: python -m pytest
      - name: Validate included results
        run: make validate-results
      - name: Check submission readiness
        run: make submission-readiness
      - name: Audit release tree
        run: python scripts/build_release_archive.py --audit-only
