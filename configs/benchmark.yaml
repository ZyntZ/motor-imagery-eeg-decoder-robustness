project_name: motor_imagery_eeg_robustness_legacy
moabb_data_dir: moabb_data
results_dir: results
random_seed: 42
preprocessing:
  fmin_hz: 8
  fmax_hz: 32
  resample_hz: 128
datasets:
- name: PhysionetMI
  paradigm: LeftRightImagery
  note: PhysioNet EEG Motor Movement/Imagery, 109 volunteers; open access through
    PhysioNet/MOABB.
- name: BNCI2014-001
  paradigm: LeftRightImagery
  note: BNCI 2014-001, 9 participants; open access through MOABB.
pipelines:
- name: csp_lda
  description: Classical Common Spatial Patterns + Linear Discriminant Analysis baseline.
  csp_components: 6
- name: riemann_lr
  description: Covariance features on Riemannian tangent space + logistic regression,
    if pyriemann is available.
stressors:
  channel_dropout:
    enabled: true
    dropout_fractions:
    - 0.1
    - 0.2
    - 0.3
    - 0.5
    repeats_per_fraction: 10
    mask_seed_scope: shared
    # Legacy schedule required to reproduce v0.3 result tables. Use benchmark_independent_masks.yaml for new inference.
  reduced_montage:
    enabled: true
    montages:
    - name: motor_core
      channels:
      - C3
      - Cz
      - C4
    - name: motor_extended
      channels:
      - FC3
      - FCz
      - FC4
      - C3
      - Cz
      - C4
      - CP3
      - CPz
      - CP4
  cross_session:
    enabled: true
    evaluation: train_first_session_test_later_sessions_when_available
statistics:
  primary_metric: roc_auc
  secondary_metrics:
  - balanced_accuracy
  - calibration_error
  confidence_intervals: bootstrap_subject_level
  bootstrap_repeats: 2000
  primary_inference: participant_level_paired_comparisons
  secondary_model: mixed_effects_subject_random_intercept
  multiple_comparisons: benjamini_hochberg_fdr
  alpha: 0.05
analysis:
  clean_working_auc_threshold: 0.6
  failure_auc_threshold: 0.6
  primary_dropout_fraction: 0.3
  risk_levels:
    high: 0.5
    moderate: 0.2
